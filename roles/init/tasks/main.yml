---
# provisioning API, nginx reverse proxy, create cert, ipxe

- name: Ensure the groupvars template exists
  ansible.builtin.stat:
    path: "/homelab/templates/groupvars.yml"
  register: groupvars_template

- name: Fail when the groupvars template is missing
  ansible.builtin.fail:
    msg: "Expected groupvars template at /homelab/templates/groupvars.yml."
  when: not groupvars_template.stat.exists

- name: Render the groupvars template
  ansible.builtin.set_fact:
    rendered_groupvars: "{{ lookup('template', '/homelab/templates/groupvars.yml') }}"

- name: Load rendered groupvars into init variables
  ansible.builtin.set_fact:
    "{{ item.key }}": "{{ item.value }}"
  loop: "{{ (rendered_groupvars | from_yaml) | dict2items }}"

- name: Template the docker-compose file
  template:
    src: docker-compose.yml.j2
    dest: "{{ mounted_data_path }}/docker-compose.yml"

- name: Clone the provisioning API repo
  git:
    repo: "{{ provisioning_api_repo }}"
    dest: "{{ mounted_data_path }}/provisioning-api"
    version: "{{ provisioning_api_version }}"
    force: yes

- name: Clone the provisioning controller repo
  git:
    repo: "{{ prov_controller_repo }}"
    dest: "{{ mounted_data_path }}/prov-controller"
    version: "{{ prov_controller_version }}"
    force: yes

- name: Clone the webhook repo
  git:
    repo: "{{ webhook_repo }}"
    dest: "{{ mounted_data_path }}/webhook"
    version: "{{ webhook_version }}"
    force: yes

- name: Publish rendered group vars
  block:
    - name: Ensure the groupvars repo is configured
      ansible.builtin.assert:
        that:
          - groupvars_repo | length > 0
        fail_msg: "GIT_GROUPVARS_REPO must be set so init can publish rendered group vars."

    - name: Ensure the local inventory group_vars directory exists
      ansible.builtin.file:
        path: "/homelab/inventory/group_vars"
        state: directory

    - name: Write rendered group vars into the local inventory
      ansible.builtin.copy:
        content: "{{ rendered_groupvars }}"
        dest: "/homelab/inventory/group_vars/all.yml"
        mode: "0644"

    - name: Create a temporary checkout for the groupvars repo
      ansible.builtin.tempfile:
        state: directory
        suffix: groupvars
      register: groupvars_repo_checkout

    - name: Clone the groupvars repo
      ansible.builtin.git:
        repo: "{{ groupvars_repo }}"
        dest: "{{ groupvars_repo_checkout.path }}"
        version: "{{ groupvars_version }}"
        force: true
        accept_hostkey: true

    - name: Write rendered group vars into the repo checkout
      ansible.builtin.copy:
        content: "{{ rendered_groupvars }}"
        dest: "{{ groupvars_repo_checkout.path }}/all.yml"
        mode: "0644"

    - name: Check whether the groupvars repo changed
      ansible.builtin.command:
        cmd: git status --porcelain
      args:
        chdir: "{{ groupvars_repo_checkout.path }}"
      register: groupvars_repo_status
      changed_when: false

    - name: Commit and push rendered group vars
      ansible.builtin.shell: |
        git config user.name "{{ groupvars_git_user_name }}"
        git config user.email "{{ groupvars_git_user_email }}"
        git add all.yml
        git commit -m "Update homelab group vars"
        git push origin HEAD:{{ groupvars_version }}
      args:
        chdir: "{{ groupvars_repo_checkout.path }}"
      when: groupvars_repo_status.stdout != ""

  always:
    - name: Remove the temporary groupvars checkout
      ansible.builtin.file:
        path: "{{ groupvars_repo_checkout.path }}"
        state: absent
      when:
        - groupvars_repo_checkout is defined
        - groupvars_repo_checkout.path is defined

- name: Create acme directory
  file:
    path: "{{ mounted_data_path }}/acme"
    state: directory

- name: Copy acme Dockerfile
  copy:
    src: acme/Dockerfile
    dest: "{{ mounted_data_path }}/acme/Dockerfile"

- name: Copy acme entrypoint.sh
  copy:
    src: acme/entrypoint.sh
    dest: "{{ mounted_data_path }}/acme/entrypoint.sh"
    mode: "0755"

- name: Create concourse directory
  file:
    path: "{{ mounted_data_path }}/concourse"
    state: directory

- name: Copy concourse Dockerfile
  copy:
    src: concourse/Dockerfile
    dest: "{{ mounted_data_path }}/concourse/Dockerfile"

- name: Copy concourse entrypoint.sh
  copy:
    src: concourse/entrypoint.sh
    dest: "{{ mounted_data_path }}/concourse/entrypoint.sh"
    mode: "0755"

- name: Create dnsmasq directory
  file:
    path: "{{ mounted_data_path }}/dnsmasq"
    state: directory

- name: Copy dnsmasq Dockerfile
  copy:
    src: dnsmasq/Dockerfile
    dest: "{{ mounted_data_path }}/dnsmasq/Dockerfile"

- name: Template dnsmasq.conf
  template:
    src: dnsmasq.conf.j2
    dest: "{{ mounted_data_path }}/dnsmasq/dnsmasq.conf"

- name: Create nginx directory
  file:
    path: "{{ mounted_data_path }}/nginx"
    state: directory

- name: Copy nginx Dockerfile
  copy:
    src: nginx/Dockerfile
    dest: "{{ mounted_data_path }}/nginx/Dockerfile"

- name: Copy nginx entrypoint.sh
  copy:
    src: nginx/entrypoint.sh
    dest: "{{ mounted_data_path }}/nginx/entrypoint.sh"
    mode: "0755"

- name: Create the files directory
  ansible.builtin.file:
    path: "{{ mounted_data_path }}/nginx/files"
    state: directory

- name: Copy nginx boot.ipxe
  copy:
    src: nginx/boot.ipxe
    dest: "{{ mounted_data_path }}/nginx/files/boot.ipxe"

- name: Copy nginx arch boot iPXE script
  copy:
    src: nginx/arch_boot.ipxe
    dest: "{{ mounted_data_path }}/nginx/files/arch_boot.ipxe"

- name: Copy nginx debian boot iPXE script
  copy:
    src: nginx/debian_boot.ipxe
    dest: "{{ mounted_data_path }}/nginx/files/debian_boot.ipxe"

- name: Template nginx.conf
  template:
    src: default.conf.j2
    dest: "{{ mounted_data_path }}/nginx/default.conf"

- name: Create vault directory
  file:
    path: "{{ mounted_data_path }}/vault"
    state: directory

- name: Create vault policies directory
  file:
    path: "{{ mounted_data_path }}/vault/policies"
    state: directory

- name: Copy vault policies
  copy:
    src: vault/policies/
    dest: "{{ mounted_data_path }}/vault/policies/"

- name: Copy vault Dockerfile
  copy:
    src: vault/Dockerfile
    dest: "{{ mounted_data_path }}/vault/Dockerfile"

- name: Copy vault entrypoint.sh
  copy:
    src: vault/entrypoint.sh
    dest: "{{ mounted_data_path }}/vault/entrypoint.sh"
    mode: "0755"

- name: Copy vault.hcl config
  copy:
    src: vault/vault.hcl
    dest: "{{ mounted_data_path }}/vault/vault.hcl"

- name: Create registry directory
  file:
    path: "{{ mounted_data_path }}/registry"
    state: directory

- name: Create registry config directory
  file:
    path: "{{ mounted_data_path }}/registry/config"
    state: directory

- name: Template the registry config
  template:
    src: config.yml.j2
    dest: "{{ mounted_data_path }}/registry/config/config.yml"

- name: Setup vault mounts
  block:
    - name: Create the internal directory
      ansible.builtin.file:
        path: "{{ mounted_data_path }}/vault/internal"
        state: directory

- name: Download iPXE efi binary
  ansible.builtin.get_url:
    url: https://boot.ipxe.org/x86_64-efi/ipxe.efi
    dest: "{{ mounted_data_path }}/nginx/files/ipxe.efi"

- name: Download iPXE iso
  ansible.builtin.get_url:
    url: https://boot.ipxe.org/ipxe.iso
    dest: "{{ mounted_data_path }}/nginx/files/ipxe.iso"

- name: Load kernel modules required for Concourse worker networking
  become: true
  ansible.builtin.command:
    cmd: "modprobe {{ item }}"
  loop: "{{ concourse_worker_kernel_modules }}"
  changed_when: false

- name: Delete the ipvlan network
  community.docker.docker_network:
    name: ipvlan
    state: absent
  ignore_errors: yes

- name: Build the docker-compose
  community.docker.docker_compose_v2:
    project_src: "{{ host_data_path }}"
    project_name: infra
    state: present
    build: always
    check_files_existing: false
    remove_orphans: yes
  register: docker_compose_result
  failed_when: docker_compose_result.failed
  ignore_errors: true
  retries: 5
  delay: 5

- name: Print Docker Compose error
  debug:
    msg: "{{ docker_compose_result.stderr | default('No error message available') }}"
  when: docker_compose_result.failed

- name: Fail if Docker Compose failed after retries
  fail:
    msg: "Docker Compose failed to start the services after multiple attempts."
  when: docker_compose_result is failed

- name: Wait for the acme.sh container to become healthy
  shell: "{% raw %}docker inspect --format='{{.State.Health.Status}}' acme{% endraw %}"
  register: acme_health
  until: acme_health.stdout == "healthy"
  retries: 1000

- name: macvlan shim
  when: network_driver == "macvlan" and ansible_os_family not in ["Darwin", "Windows"]
  block:
    - name: Is the macvlan network already created?
      ansible.builtin.command: ip link show macvlan-shim
      register: macvlan_check
      ignore_errors: true

    - name: Create macvlan shim (linux only)
      ansible.builtin.shell: |
        nsenter --target 1 --net --mount ip link add macvlan-shim link {{ interface }} type macvlan mode bridge
        nsenter --target 1 --net --mount ip addr add {{ macvlan_host_ip }} dev macvlan-shim
        nsenter --target 1 --net --mount ip link set macvlan-shim up
        nsenter --target 1 --net --mount ip route add {{ macvlan_subnet }} dev macvlan-shim || true
      when: macvlan_check.rc != 0
      become: true

- name: Wait for the vault root password file to generate
  ansible.builtin.wait_for:
    path: "{{ mounted_data_path }}/vault/vault_stuff/stuff/root_token"
    state: present
    timeout: 120

- name: Wait for the Vault API to become reachable
  ansible.builtin.uri:
    url: "{{ vault_bootstrap_url }}/v1/sys/health"
    method: GET
    status_code:
      - 200
      - 429
      - 472
      - 473
      - 501
      - 503
    validate_certs: false
  register: vault_health
  retries: 60
  delay: 2
  until: vault_health is succeeded

- name: Set the vault root password
  ansible.builtin.set_fact:
    vault_root_password: "{{ lookup('file', mounted_data_path + '/vault/vault_stuff/stuff/root_token') | trim }}"

- name: Print the vault root password
  debug:
    msg: "{{ vault_root_password }}"

# - name: Create git id25519 SSH key
#   community.crypto.openssh_keypair:
#     path: "{{ git_ssh_key_path }}"
#     type: "ed25519"

# - name: Create provisioning id25519 SSH key
#   community.crypto.openssh_keypair:
#     path: "{{ provisioning_ssh_key_path }}"
#     type: "ed25519"

- name: Store the git provisioning key
  set_fact:
    git_prov_key: "{{ lookup('file', '/etc/ssh/git_provisioning_key') }}"

- name: Store the provisioning key
  set_fact:
    prov_key: "{{ lookup('file', '/etc/ssh/provisioning_key') }}"

- name: Generate the public key from the git provisioning private key
  ansible.builtin.shell:
    cmd: |
      echo "{{ git_prov_key }}" > /tmp/temp_key && chmod 600 /tmp/temp_key && ssh-keygen -y -f /tmp/temp_key
  register: git_ssh_public_key

- name: Generate the public key from the public key
  ansible.builtin.shell:
    cmd: |
      echo "{{ prov_key }}" > /tmp/temp_key && chmod 600 /tmp/temp_key && ssh-keygen -y -f /tmp/temp_key
  register: prov_ssh_public_key

- name: Upload bootstrap secrets to Vault
  community.hashi_vault.vault_kv2_write:
    url: "{{ vault_bootstrap_url }}"
    engine_mount_point: "{{ item.mount }}"
    path: "{{ item.path }}"
    data:
      key: "{{ item.value }}"
    token: "{{ vault_root_password }}"
    validate_certs: false
  loop:
    - mount: kv2
      path: vault/root_token
      value: "{{ vault_root_password }}"
    - mount: kv2
      path: github/ssh/public
      value: "{{ git_ssh_public_key.stdout }}"
    - mount: kv2
      path: github/ssh/private
      value: "{{ git_prov_key }}"
    - mount: concourse
      path: shared/github_ssh_private_key
      value: "{{ git_prov_key }}"
    - mount: concourse
      path: shared/github/webhook
      value: "{{ lookup('env', 'GITHUB_WEBHOOK_SECRET') }}"
    - mount: kv2
      path: provisioning/ssh/private
      value: "{{ prov_key }}"
    - mount: kv2
      path: provisioning/ssh/public
      value: "{{ prov_ssh_public_key.stdout }}"
    - mount: concourse
      path: main/root_token
      value: "{{ vault_root_password }}"
    - mount: kv2
      path: router/primary/api_password
      value: "{{ lookup('env', 'PRIMARY_ROUTER_API_PASSWORD') }}"
    - mount: kv2
      path: concourse/local_user/password
      value: "{{ lookup('env', 'CONCOURSE_PASSWORD') }}"
    - mount: kv2
      path: concourse/oauth/client_secret
      value: "{{ lookup('env', 'CONCOURSE_OAUTH_CLIENT_SECRET') }}"
    - mount: kv2
      path: cloudflare/api_key
      value: "{{ lookup('env', 'CLOUDFLARE_API_KEY') }}"
    - mount: kv2
      path: zerossl/eab/kid
      value: "{{ lookup('env', 'ZEROSSL_EAB_KID') }}"
    - mount: kv2
      path: zerossl/eab/hmac_key
      value: "{{ lookup('env', 'ZEROSSL_EAB_HMAC_KEY') }}"
    - mount: kv2
      path: postgres/osdb/password
      value: "{{ lookup('env', 'POSTGRES_PASSWORD') }}"
  no_log: true
  retries: 50
  delay: 5
  when: item.value | length > 0

- name: Wait for the provisioning controller API to become reachable
  ansible.builtin.uri:
    url: "{{ prov_controller_api_url }}/routers/"
    method: GET
    status_code: 200
  register: prov_controller_api
  retries: 30
  delay: 3
  until: prov_controller_api is succeeded

- name: Define the bootstrap router resource
  ansible.builtin.set_fact:
    bootstrap_router:
      apiVersion: homelab.io/v1
      kind: Router
      metadata:
        name: "{{ primary_router_name }}"
      spec:
        name: "{{ primary_router_name }}"
        role: "{{ primary_router_role }}"
        managementIP: "{{ primary_router_management_ip }}"
        apiPort: "{{ primary_router_api_port }}"
        apiUsername: "{{ primary_router_api_username }}"
        apiPassword: "{{ lookup('env', 'PRIMARY_ROUTER_API_PASSWORD') }}"

- name: Check whether the bootstrap router already exists
  ansible.builtin.uri:
    url: "{{ prov_controller_api_url }}/routers/{{ primary_router_name }}"
    method: GET
    status_code:
      - 200
      - 404
  register: bootstrap_router_check

- name: Create the bootstrap router when it is missing
  ansible.builtin.uri:
    url: "{{ prov_controller_api_url }}/routers/"
    method: POST
    body_format: json
    status_code: 200
    body: "{{ bootstrap_router }}"
  when: bootstrap_router_check.status == 404

- name: Update the bootstrap router when it already exists
  ansible.builtin.uri:
    url: "{{ prov_controller_api_url }}/routers/{{ primary_router_name }}"
    method: PATCH
    body_format: json
    status_code: 200
    body:
      spec: "{{ bootstrap_router.spec }}"
  when: bootstrap_router_check.status == 200

- name: Define the bootstrap inventory capture group
  ansible.builtin.set_fact:
    bootstrap_inventory_capture_group:
      apiVersion: homelab.io/v1
      kind: InventoryCaptureGroup
      metadata:
        name: servers
      spec:
        selector:
          matchLabels:
            homelab.io/type: server

- name: Check whether the bootstrap inventory capture group already exists
  ansible.builtin.uri:
    url: "{{ prov_controller_api_url }}/inventorycapturegroups/servers"
    method: GET
    status_code:
      - 200
      - 404
  register: bootstrap_inventory_capture_group_check

- name: Create the bootstrap inventory capture group when it is missing
  ansible.builtin.uri:
    url: "{{ prov_controller_api_url }}/inventorycapturegroups/"
    method: POST
    body_format: json
    status_code: 200
    body: "{{ bootstrap_inventory_capture_group }}"
  when: bootstrap_inventory_capture_group_check.status == 404

- name: Update the bootstrap inventory capture group when it already exists
  ansible.builtin.uri:
    url: "{{ prov_controller_api_url }}/inventorycapturegroups/servers"
    method: PATCH
    body_format: json
    status_code: 200
    body:
      spec: "{{ bootstrap_inventory_capture_group.spec }}"
  when: bootstrap_inventory_capture_group_check.status == 200

- name: Define desired DNS records for bootstrap services
  ansible.builtin.set_fact:
    bootstrap_dns_records:
      - name: nginx-public
        fqdn: "{{ nginx_acme_label }}"
        address: "{{ nginx_ipv4 }}"
        comment: "homelab nginx"
      - name: server-api-public
        fqdn: "{{ server_api_fqdn }}"
        address: "{{ nginx_ipv4 }}"
        comment: "homelab server api via nginx"
      - name: mgmt-public
        fqdn: "{{ mgmt_fqdn }}"
        address: "{{ nginx_ipv4 }}"
        comment: "homelab mgmt via nginx"
      - name: vault-public
        fqdn: "{{ vault_acme_label }}"
        address: "{{ nginx_ipv4 }}"
        comment: "homelab vault via nginx"
      - name: vault-api-public
        fqdn: "{{ vault_api_fqdn }}"
        address: "{{ nginx_ipv4 }}"
        comment: "homelab vault api via nginx"
      - name: ci-public
        fqdn: "{{ concourse_fqdn }}"
        address: "{{ nginx_ipv4 }}"
        comment: "homelab concourse via nginx"
      - name: registry-public
        fqdn: "{{ registry_fqdn }}"
        address: "{{ nginx_ipv4 }}"
        comment: "homelab registry via nginx"
      - name: controller-public
        fqdn: "{{ prov_controller_fqdn }}"
        address: "{{ nginx_ipv4 }}"
        comment: "homelab provisioning controller via nginx"

- name: Check existing DNS records in the provisioning controller
  ansible.builtin.uri:
    url: "{{ prov_controller_api_url }}/dnsrecords/{{ item.name }}"
    method: GET
    status_code:
      - 200
      - 404
  loop: "{{ bootstrap_dns_records }}"
  loop_control:
    label: "{{ item.name }}"
  register: bootstrap_dns_record_checks

- name: Create missing DNS records in the provisioning controller
  ansible.builtin.uri:
    url: "{{ prov_controller_api_url }}/dnsrecords/"
    method: POST
    body_format: json
    status_code: 200
    body:
      apiVersion: homelab.io/v1
      kind: DNSRecord
      metadata:
        name: "{{ item.item.name }}"
      spec:
        providerRef:
          kind: Router
          name: "{{ primary_router_name }}"
        fqdn: "{{ item.item.fqdn }}"
        address: "{{ item.item.address }}"
        ttl: 300
        comment: "{{ item.item.comment }}"
  loop: "{{ bootstrap_dns_record_checks.results | default([]) }}"
  loop_control:
    label: "{{ item.item.name }}"
  when: item.status == 404

- name: Update existing DNS records in the provisioning controller
  ansible.builtin.uri:
    url: "{{ prov_controller_api_url }}/dnsrecords/{{ item.item.name }}"
    method: PATCH
    body_format: json
    status_code: 200
    body:
      spec:
        providerRef:
          kind: Router
          name: "{{ primary_router_name }}"
        fqdn: "{{ item.item.fqdn }}"
        address: "{{ item.item.address }}"
        ttl: 300
        comment: "{{ item.item.comment }}"
  loop: "{{ bootstrap_dns_record_checks.results | default([]) }}"
  loop_control:
    label: "{{ item.item.name }}"
  when: item.status == 200

# - name: Build ISOs
#   include_tasks: build_isos.yml

- name: Show vault URL
  debug:
    var: vault_url

- name: Push the prov image to the registry
  ansible.builtin.shell:
    cmd: |
      skopeo copy --dest-tls-verify=false docker-daemon:prov:latest docker://{{ registry_ipv4 }}:5000/prov:latest
  register: prov_push
  retries: 5
  delay: 5

- name: Initialize infra pipelines
  import_role:
    name: concourse
    tasks_from: create_commands_pipeline

- name: Fetch the inventory capture groups from API
  ansible.builtin.uri:
    url: "{{ prov_controller_api_url }}/inventorycapturegroups/"
    method: GET
    status_code: 200
  register: inventory_capture_groups

- name: Extract the inventory capture group names
  ansible.builtin.set_fact:
    inventory_capture_group_names: "{{ inventory_capture_groups.json | map(attribute='metadata.name') | list }}"

- name: Show the inventory capture group names
  debug:
    var: inventory_capture_group_names

- name: Create the inventory capture group standup pipelines
  include_tasks: create_inventory_capture_group_pipeline.yml

- name: Initialize ISO build pipeline
  import_role:
    name: concourse
    tasks_from: create_iso_build_pipeline
